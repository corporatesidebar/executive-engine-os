<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executive OS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-kicker">Rival Summit</div>
        <div class="brand-title">Executive OS</div>
      </div>

      <nav class="nav">
        <div class="nav-section">Workspace</div>
        <button class="nav-item active" type="button">Executive Engine</button>
        <button class="nav-item" type="button">Memory</button>
        <button class="nav-item" type="button">Uploads</button>
        <button class="nav-item" type="button">Settings</button>
      </nav>

      <div class="profile-card">
        <div class="profile-label">Profile</div>
        <textarea id="profile" placeholder="Example: Will Webb | COO target | strategy, execution, scaling businesses | direct tone"></textarea>
      </div>

      <div class="upload-card">
        <div class="profile-label">Upload Context</div>
        <input id="fileInput" type="file" accept=".txt,.md,.csv">
        <div id="fileStatus" class="file-status">No file loaded</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <div class="eyebrow">Executive Decision Platform</div>
          <h1>Executive Engine</h1>
          <p class="subcopy">Put in a real situation. Get an operator-level answer.</p>
        </div>
        <div class="live-pill">LIVE</div>
      </div>

      <section class="panel">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="strategy" type="button">Strategy</button>
          <button class="mode-tab" data-mode="decision" type="button">Decision</button>
          <button class="mode-tab" data-mode="meeting" type="button">Meeting</button>
          <button class="mode-tab" data-mode="execution" type="button">Execution</button>
        </div>

        <label class="field-label" for="input">Situation</label>
        <textarea id="input" class="main-input" placeholder="Describe the situation clearly..."></textarea>

        <div class="button-row">
          <button id="runBtn" class="primary-button" type="button">Run Engine</button>
        </div>

        <div id="loading" class="loading hidden">Thinking...</div>

        <div id="responseShell" class="response-shell hidden">
          <div class="response-header">Response</div>
          <div id="responseCards" class="response-cards"></div>
          <pre id="rawOutput" class="hidden"></pre>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
