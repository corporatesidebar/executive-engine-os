<!DOCTYPE html>
<html>
<head>
<title>Executive Engine</title>
<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width:900px; margin:auto; }
#chat { height:60vh; overflow:auto; background:#fff; padding:10px; }
.user { text-align:right; color:blue; }
.ai { background:#eee; padding:10px; margin:5px; white-space:pre-wrap; }
</style>
</head>
<body>
<div class="container">
<h1>Executive Engine</h1>

<select id="mode">
<option value="strategy">Strategy</option>
<option value="hiring">Hiring</option>
<option value="finance">Finance</option>
<option value="execution">Execution</option>
</select>

<div id="chat"></div>

<input id="input" placeholder="Enter situation..." style="width:80%;">
<button onclick="send()">Send</button>
</div>

<script>
async function send(){
    let text = document.getElementById("input").value;
    let mode = document.getElementById("mode").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class="user">${text}</div>`;

    let res = await fetch("/command", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({situation:text, mode:mode})
    });

    let data = await res.json();
    chat.innerHTML += `<div class="ai">${data.response}</div>`;
}
</script>
</body>
</html>
