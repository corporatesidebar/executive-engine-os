<!DOCTYPE html><html><head><title>Command</title><link rel="stylesheet" href="style.css"></head><body><div class="chat" id="chat"></div><div class="input-box"><input id="input" placeholder="Enter situation..." /><button onclick="send()">Send</button></div><script>const API="https://executive-engine-os.onrender.com";async function send(){const input=document.getElementById("input");const chat=document.getElementById("chat");const text=input.value;if(!text)return;chat.innerHTML+=`<div class="user">${text}</div>`;input.value="";const res=await fetch(API+"/command",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({situation:text})});const data=await res.json();chat.innerHTML+=`<div class="ai">${data.response}</div>`;}</script></body></html>
