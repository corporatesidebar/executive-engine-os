<!DOCTYPE html>
<html>
<head>
    <title>Executive Engine</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; }
        .container { max-width: 1000px; margin:auto; padding:20px; }
        h1 { text-align:center; }
        #chat { height:60vh; overflow:auto; background:#fff; padding:15px; border-radius:10px; }
        .toolbar { margin-bottom: 10px; }
        .user { text-align:right; margin:10px 0; color:#1f4ed8; font-weight:bold; }
        .ai { text-align:left; margin:10px 0; background:#eaeaea; padding:12px; border-radius:8px; white-space:pre-wrap; }
        .input-box { display:flex; gap:10px; margin-top:10px; }
        input { flex:1; padding:12px; font-size:16px; }
        button { padding:12px 20px; font-size:16px; cursor:pointer; }
        select { padding:8px; font-size:16px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Executive Engine</h1>

    <div class="toolbar">
        <select id="mode">
            <option value="strategy">Strategy</option>
            <option value="hiring">Hiring</option>
            <option value="finance">Finance</option>
            <option value="execution">Execution</option>
        </select>
    </div>

    <div id="chat"></div>

    <div class="input-box">
        <input id="input" placeholder="Enter situation..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const mode = document.getElementById("mode");
    const chat = document.getElementById("chat");
    const text = input.value.trim();

    if (!text) return;

    chat.innerHTML += `<div class="user">[${mode.value}] ${text}</div>`;
    input.value = "";

    try {
        const res = await fetch("/command", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ situation: text, mode: mode.value })
        });

        const raw = await res.text();
        if (!raw) {
            chat.innerHTML += `<div class="ai">ERROR: Empty server response</div>`;
            return;
        }

        const data = JSON.parse(raw);
        chat.innerHTML += `<div class="ai">${data.response}</div>`;
        chat.scrollTop = chat.scrollHeight;
    } catch (err) {
        chat.innerHTML += `<div class="ai">ERROR: ${err}</div>`;
    }
}

document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") send();
});
</script>
</body>
</html>
