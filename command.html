<!DOCTYPE html>
<html>
<head>
<title>Executive Engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Executive Engine</h1>

<textarea id="input" placeholder="Enter situation..."></textarea>
<br><br>
<button onclick="send()">Send</button>

<pre id="output"></pre>

<script>
async function send() {
    const input = document.getElementById("input").value;

    const res = await fetch("https://executive-engine-os.onrender.com/api/command", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({input})
    });

    const data = await res.json();
    document.getElementById("output").innerText = data.output || data.error;
}
</script>

</body>
</html>
