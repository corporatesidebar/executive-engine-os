<!DOCTYPE html>

<html>
<head>
  <title>Executive Command</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="font-family: Arial; padding:20px;">

<h2>Command</h2>

<input id="input" placeholder="Enter situation..." style="width:70%; padding:10px;" />
<button onclick="send()" style="padding:10px;">Send</button>

<pre id="output" style="margin-top:20px; white-space:pre-wrap;"></pre>

<script>

const API = "https://executive-engine-os.onrender.com";

async function send(){

  const val = document.getElementById("input").value;

  if(!val){
    document.getElementById("output").innerText = "Enter something first.";
    return;
  }

  document.getElementById("output").innerText = "Loading...";

  try {

    const res = await fetch(API + "/command", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        situation: val
      })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      "Outcome:\n" + data.outcome + "\n\n" +
      "Context:\n" + data.context + "\n\n" +
      "Action:\n" + data.required_action;

  } catch (err) {
    document.getElementById("output").innerText =
      "ERROR:\n\n" + err;
  }

}

</script>

</body>
</html>
