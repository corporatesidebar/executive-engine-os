<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Engine V29</title>

<style>
:root{
  --blue:#0f62fe;
  --orange:#ff5a1f;
  --nav:#061a3a;
  --bg:#f5f8fc;
  --card:#ffffff;
  --line:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}

.app{
  display:grid;
  grid-template-columns:240px 1fr 320px;
  height:100vh;
}

/* LEFT NAV */
.nav{
  background:var(--nav);
  color:#fff;
  padding:20px;
}
.nav h1{
  font-size:18px;
  margin-bottom:20px;
}
.nav button{
  display:block;
  width:100%;
  background:transparent;
  color:#cbd5e1;
  border:0;
  text-align:left;
  padding:10px;
  border-radius:8px;
}
.nav button.active,
.nav button:hover{
  background:var(--blue);
  color:#fff;
}

/* MAIN */
.main{
  padding:24px;
  overflow:auto;
}

/* INPUT */
.input-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:20px;
}

.input-card h2{
  margin:0 0 6px;
  font-size:24px;
}
textarea{
  width:100%;
  height:100px;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  resize:none;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

select{
  background:var(--orange);
  color:#fff;
  border:0;
  padding:8px 12px;
  border-radius:8px;
}

button.run{
  background:var(--orange);
  color:#fff;
  border:0;
  padding:10px 16px;
  border-radius:8px;
}

/* NEXT MOVE */
.next{
  background:#fff7ed;
  border-left:6px solid var(--orange);
  border-radius:14px;
  padding:18px;
  margin-bottom:20px;
}
.next h3{
  margin:0 0 6px;
  font-size:26px;
}

/* TASK */
.task{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
}
.task h4{
  margin:0 0 6px;
}
.task button{
  margin-top:10px;
}

/* RIGHT PANEL */
.right{
  background:#061a3a;
  color:#fff;
  padding:16px;
}
.right-card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="nav">
  <h1>Executive Engine</h1>
  <button class="active">Decision Weapon</button>
  <button>Execution Queue</button>
  <button>Memory</button>
</div>

<div class="main">

  <div class="input-card">
    <h2>What needs to get done?</h2>
    <textarea id="input"></textarea>

    <div class="row">
      <select id="mode">
        <option>Execution</option>
        <option>Strategy</option>
      </select>

      <button class="run" onclick="run()">Run Engine</button>
    </div>
  </div>

  <div id="output"></div>

</div>

<div class="right">
  <div class="right-card">
    <strong>DO THIS NOW</strong>
    <div id="sideNow">Run engine</div>
  </div>

  <div class="right-card">
    Tasks: <span id="tasks">0</span>
  </div>
</div>

</div>

<script>
const API = "https://executive-engine-os-v2.onrender.com";

async function run(){
  const input = document.getElementById("input").value;

  const res = await fetch(API + "/run", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({input})
  });

  const d = await res.json();

  document.getElementById("output").innerHTML = `
    <div class="next">
      <h3>${d.next_move}</h3>
      <div>${d.decision}</div>
    </div>

    <div class="task">
      <h4>DO THIS NOW</h4>
      <div>${d.actions[0]}</div>
    </div>
  `;

  document.getElementById("sideNow").innerText = d.actions[0];
  document.getElementById("tasks").innerText = d.actions.length;
}
</script>

</body>
</html>
