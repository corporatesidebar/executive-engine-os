<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Executive Engine</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #ffffff;
    color: #111111;
}
.app {
    max-width: 880px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px;
}
.header {
    padding-bottom: 18px;
    border-bottom: 1px solid #eeeeee;
}
.header h1 {
    margin: 0;
    font-size: 24px;
    letter-spacing: -0.03em;
}
.header p {
    margin: 6px 0 0;
    color: #666666;
    font-size: 14px;
}
.chat {
    flex: 1;
    padding: 22px 0 150px;
}
.message {
    margin-bottom: 18px;
    display: flex;
}
.message.user { justify-content: flex-end; }
.bubble {
    max-width: 82%;
    padding: 14px 16px;
    border-radius: 16px;
    line-height: 1.45;
    font-size: 15px;
}
.user .bubble {
    background: #111111;
    color: #ffffff;
    border-bottom-right-radius: 4px;
}
.assistant .bubble {
    background: #f7f7f7;
    color: #111111;
    border: 1px solid #eeeeee;
    border-bottom-left-radius: 4px;
}
.block {
    margin-bottom: 14px;
}
.block:last-child { margin-bottom: 0; }
.label {
    font-size: 11px;
    font-weight: 800;
    color: #777777;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
}
ul {
    margin: 6px 0 0 18px;
    padding: 0;
}
li { margin-bottom: 6px; }
.composer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255,255,255,0.96);
    border-top: 1px solid #eeeeee;
    padding: 14px;
}
.composer-inner {
    max-width: 880px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
}
textarea {
    flex: 1;
    min-height: 54px;
    max-height: 160px;
    padding: 14px;
    font-size: 15px;
    border-radius: 14px;
    border: 1px solid #dddddd;
    resize: none;
    outline: none;
    font-family: inherit;
}
textarea:focus { border-color: #111111; }
button {
    height: 54px;
    padding: 0 18px;
    background: #111111;
    color: #ffffff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
}
button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
}
.status {
    color: #777777;
    font-size: 14px;
}
@media (max-width: 720px) {
    .app { padding: 18px; }
    .bubble { max-width: 94%; }
    .composer-inner { flex-direction: column; }
    textarea, button { width: 100%; }
}
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Executive Engine</h1>
        <p>Enter a command. Get a clear decision, next move, actions, risk, and priority.</p>
    </div>
    <div id="chat" class="chat"></div>
</div>

<div class="composer">
    <div class="composer-inner">
        <textarea id="input" placeholder="Enter command..."></textarea>
        <button id="runBtn" onclick="runEngine()">Run Engine</button>
    </div>
</div>

<script>
const API = "https://executive-engine-os.onrender.com/run";
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const runBtn = document.getElementById("runBtn");
let messages = JSON.parse(localStorage.getItem("executive_engine_messages") || "[]");

function saveMessages() {
    localStorage.setItem("executive_engine_messages", JSON.stringify(messages));
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function assistantHtml(data) {
    const actions = Array.isArray(data.actions) ? data.actions : [];
    return `
        <div class="block">
            <div class="label">Next Move</div>
            <div>${escapeHtml(data.next_move || "-")}</div>
        </div>
        <div class="block">
            <div class="label">Decision</div>
            <div>${escapeHtml(data.decision || "-")}</div>
        </div>
        <div class="block">
            <div class="label">Actions</div>
            <ul>${actions.map(a => `<li>${escapeHtml(a)}</li>`).join("") || "<li>-</li>"}</ul>
        </div>
        <div class="block">
            <div class="label">Risk</div>
            <div>${escapeHtml(data.risk || "-")}</div>
        </div>
        <div class="block">
            <div class="label">Priority</div>
            <div>${escapeHtml(data.priority || "-")}</div>
        </div>
    `;
}

function renderMessages() {
    chat.innerHTML = "";
    if (!messages.length) {
        chat.innerHTML = `<div class="status">Ready. Run your first command.</div>`;
        return;
    }
    messages.forEach(msg => {
        const row = document.createElement("div");
        row.className = `message ${msg.role}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = msg.role === "assistant" ? assistantHtml(msg.data) : escapeHtml(msg.content);
        row.appendChild(bubble);
        chat.appendChild(row);
    });
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

async function runEngine() {
    const value = input.value.trim();
    if (!value) return;

    messages.push({ role: "user", content: value, timestamp: new Date().toISOString() });
    input.value = "";
    runBtn.disabled = true;
    runBtn.textContent = "Running...";
    renderMessages();

    try {
        console.log("POST", API, { input: value, mode: "execution" });
        const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input: value, mode: "execution" })
        });

        const raw = await res.text();
        console.log("Backend raw response:", raw);

        if (!res.ok) throw new Error(`Backend returned ${res.status}: ${raw}`);

        let data;
        try {
            data = JSON.parse(raw);
        } catch (parseError) {
            throw new Error("Backend did not return valid JSON");
        }

        messages.push({ role: "assistant", data, timestamp: new Date().toISOString() });
        saveMessages();
        renderMessages();
    } catch (err) {
        console.error(err);
        messages.push({
            role: "assistant",
            data: {
                next_move: "Backend connection failed. Confirm /run is live and CORS is enabled.",
                decision: "Frontend loaded, but backend did not return usable JSON.",
                actions: [
                    "Open backend Render service logs.",
                    "Confirm https://executive-engine-os.onrender.com/health is live.",
                    "Confirm POST /run accepts { input, mode }.",
                    "Confirm CORS allow_origins includes '*'."
                ],
                risk: err.message,
                priority: "High"
            },
            timestamp: new Date().toISOString()
        });
        saveMessages();
        renderMessages();
    } finally {
        runBtn.disabled = false;
        runBtn.textContent = "Run Engine";
    }
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        runEngine();
    }
});

renderMessages();
</script>
</body>
</html>
