adding:18px;overflow:auto}.historyItem{border:1px solid var(--line);border-radius:18px;padding:13px;margin-bottom:10px;background:#fbfdff}.historyItem b{display:block}.chat{display:flex;flex-direction:column}.messages{flex:1;overflow:auto;padding:22px;display:flex;flex-direction:column;gap:12px}.bubble{max-width:82%;border-radius:22px;padding:14px 16px;background:#f0f5fb;white-space:pre-wrap}.bubble.user{align-self:flex-end;background:#245cff;color:white}.bubble.assistant{align-self:flex-start}.composer{display:grid;grid-template-columns:1fr 112px;gap:10px;border-top:1px solid var(--line);padding:15px}.composer textarea{height:60px;resize:none;border:1px solid #dbe5f1;border-radius:18px;padding:13px;outline:0}.rail{height:100vh;overflow:auto;background:#06101d;color:#edf5ff;padding:25px 21px;border-left:1px solid rgba(255,255,255,.08)}.rail h2{margin:0;font-size:19px;letter-spacing:-.03em}.rail p{color:#9fb1c9;font-size:12px}.radar{height:164px;border-radius:50%;background:radial-gradient(circle,#17375f 0 2px,transparent 3px),repeating-radial-gradient(circle,rgba(63,175,255,.16) 0 1px,transparent 1px 25px),conic-gradient(from 40deg,rgba(52,211,153,.28),transparent 22%,rgba(36,92,255,.20),transparent 62%);border:1px solid rgba(255,255,255,.12);margin:18px auto;width:164px;position:relative}.radar:after{content:"";position:absolute;left:50%;top:50%;width:70px;height:2px;background:#4ade80;transform-origin:left center;animation:sweep 3.5s linear infinite;box-shadow:0 0 20px #4ade80}@keyframes sweep{to{transform:rotate(360deg)}}.railSec{border-top:1px solid rgba(255,255,255,.10);margin-top:18px;padding-top:17px}.railCard{background:#10233e;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:15px;margin:9px 0;transition:.18s}.railCard:hover{transform:translateX(-2px);background:#142b4c}.railCard strong{display:block}.railCard span{color:#b7c6da;font-size:12px}.railCard.orange{background:#5b2b0b}.railCard.red{background:#43111c}.railCard.green{background:#063d2b}.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(4,10,18,.65);align-items:center;justify-content:center}.modal.show{display:flex}.modalIn{width:min(980px,92vw);max-height:86vh;overflow:auto;background:white;border-radius:30px;padding:26px;box-shadow:0 50px 120px rgba(0,0,0,.38)}.toast{position:fixed;left:50%;bottom:25px;z-index:200;transform:translateX(-50%) translateY(18px);opacity:0;background:#07101c;color:white;border-radius:999px;padding:12px 18px;transition:.22s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:1250px){.app{grid-template-columns:280px 1fr 330px}.grid4{grid-template-columns:repeat(2,1fr)}}

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">EA</div><div><h1>Executive Assistant OS</h1><p>V35130 Real Workflow</p></div></div>
    <nav id="nav" class="nav"></nav>
    <div class="sideCard"><b>Flight Deck Principle</b><p>Today is the cockpit. Every page is a focused tool: decide, execute, save, and follow up.</p></div>
  </aside>
  <main class="main">
    <div class="top">
      <div class="topRow"><div class="title"><h2 id="pageTitle">Today</h2><p id="pageSub">Executive flight deck: pressure, priority, decision, actions, and follow-up.</p></div><div class="pills"><span class="pill"><span class="dot"></span><span id="backendPill">Checking backend</span></span><span class="pill" id="dbPill">DB check</span><span class="pill">V35130</span></div></div>
      <div class="commandBar"><select id="mode"><option value="execution">Execution</option><option value="strategy">Strategy</option><option value="decision">Decision</option><option value="meeting">Meeting</option><option value="proposal">Proposal</option><option value="email">Email</option></select><input id="command" placeholder="Type the real work: prepare a client proposal, meeting brief, follow-up, decision, or operating plan..." /><button class="primary" onclick="runOS()">Run OS</button></div>
    </div>
    <div id="pages"></div>
  </main>
  <aside class="rail" id="rail"></aside>
</div>
<div class="modal" id="modal"><div class="modalIn"><div class="sectionHeader"><div><span class="kicker">Detail</span><h3 id="modalTitle">Detail</h3></div><button class="btn" onclick="closeModal()">Close</button></div><div id="modalBody"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const API='https://executive-engine-os.onrender.com';
const VERSION='36080-output-quality-real-use-polish';
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const clean=s=>String(s??'').replace(/Build executive workspace for/gi,'Executive Workspace').replace(/\s+/g,' ').trim();
const state={page:'today',backend:{},db:{},dbItems:[],operator:{},workspace:{},runs:JSON.parse(localStorage.getItem('ee_runs_v35130')||'[]'),tasks:JSON.parse(localStorage.getItem('ee_tasks_v35130')||'null')||[
 {task:'Confirm today\'s highest-value outcome and decision owner.',priority:'High',status:'open'},
 {task:'Send the proposal review follow-up before noon.',priority:'High',status:'open'},
 {task:'Run DB test write and confirm Supabase persistence.',priority:'Medium',status:'open'},
 {task:'Turn the next client conversation into a saved workspace.',priority:'Medium',status:'open'}],assets:JSON.parse(localStorage.getItem('ee_assets_v35130')||'[]'),notes:JSON.parse(localStorage.getItem('ee_notes_v35130')||'[]')};
state.operating=JSON.parse(localStorage.getItem('ee_operating_v36010')||'null')||{};
state.dailyUse=JSON.parse(localStorage.getItem('ee_daily_use_v36020')||'null')||{};
state.dailyFlow=JSON.parse(localStorage.getItem('ee_daily_flow_v36070')||'null')||{};
const groups=[['COMMAND',[['dailyflow','◆','Daily Flow',1],['dailyuse','▶','Daily Use',1],['operating','⬢','Operating Layer',1],['today','✦','Today',3],['daily','☀','Daily Brief',1],['run','⌘','Run Command',0],['meeting','◴','Meeting Prep',0],['decisions','◆','Decisions',0]]],['WORKFLOW',[['workspace','▣','Workspace',0],['actions','☑','Action Queue',state.tasks.filter(t=>t.status!=='done').length],['assets','▤','Assets',state.assets.length],['followups','✉','Follow-Ups',1],['notes','✎','Notes',state.notes.length]]],['INTELLIGENCE',[['operator','◎','Operator Intelligence',0],['risk','⚠','Risk Monitor',1],['strategy','↗','Strategy Board',0],['team','◌','Team Pulse',0],['finance','$','Financial Snapshot',0]]],['SYSTEM',[['database','◫','Database',0],['status','●','System Status',0]]]];
const copy={dailyflow:['Daily Flow','Start day, attention, first move, top 3, meeting prep, follow-ups, end-of-day review, and tomorrow prep.'],dailyuse:['Daily Use','Start here: what to do first, top 3 moves, follow-up, asset, risk, and end-of-day review.'],operating:['Operating Layer','Push-based command layer: now, today, tomorrow, decisions, execution, risks, and follow-ups.'],today:['Today','Executive cockpit: pressure, priority, decision, actions, and follow-up.'],daily:['Daily Brief','Start here before the day gets noisy.'],run:['Run Command','Deeper ChatGPT-style work room with saved run history.'],meeting:['Meeting Prep','Turn meetings into decisions before they happen.'],decisions:['Decisions','Save the call, tradeoff, risk, and next owner.'],workspace:['Workspace','The active client/project operating file.'],actions:['Action Queue','Executable work, not vague tasks.'],assets:['Assets','Generated proposals, emails, briefs, plans, and scripts.'],followups:['Follow-Ups','Messages that move conversations forward.'],notes:['Notes','Fast capture for context and memory.'],operator:['Operator Intelligence','Pressure, open loops, and next-best action.'],risk:['Risk Monitor','What could slow, block, or weaken execution.'],strategy:['Strategy Board','Bigger moves, market angles, and decision gates.'],team:['Team Pulse','People, owners, dependencies, and blockers.'],finance:['Financial Snapshot','Revenue, cost, pipeline, and execution impact.'],database:['Database','Supabase status, writes, reads, and persistence.'],status:['System Status','Routes, providers, version, and diagnostics.']};
function save(){localStorage.setItem('ee_runs_v35130',JSON.stringify(state.runs.slice(0,30)));localStorage.setItem('ee_tasks_v35130',JSON.stringify(state.tasks));localStorage.setItem('ee_assets_v35130',JSON.stringify(state.assets.slice(0,50)));localStorage.setItem('ee_notes_v35130',JSON.stringify(state.notes.slice(0,60)));localStorage.setItem('ee_operating_v36010',JSON.stringify(state.operating||{}));localStorage.setItem('ee_daily_use_v36020',JSON.stringify(state.dailyUse||{}));localStorage.setItem('ee_daily_flow_v36070',JSON.stringify(state.dailyFlow||{}));}
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}
async function api(path,opts={}){const res=await fetch(API+path,{headers:{'Content-Type':'application/json','Accept':'application/json'},...opts});if(!res.ok)throw new Error(path+' '+res.status);return await res.json()}
function setPage(id){state.page=id;render()}
function renderNav(){let html='';groups.forEach(([g,items])=>{html+=`<div class="navTitle">${g}</div>`;items.forEach(([id,ico,label,b])=>{let count=id==='actions'?state.tasks.filter(t=>t.status!=='done').length:id==='assets'?state.assets.length:id==='notes'?state.notes.length:b;html+=`<button class="navBtn ${state.page===id?'active':''}" onclick="setPage('${id}')"><span class="ico">${ico}</span><span>${label}</span>${count?`<span class="badge">${count}</span>`:''}</button>`})});$('nav').innerHTML=html;}
function render(){renderNav();renderPages();renderRail();$('pageTitle').textContent=copy[state.page][0];$('pageSub').textContent=copy[state.page][1];$('backendPill').textContent=state.backend.version?clean(state.backend.version):'Checking backend';$('dbPill').textContent=state.db.configured?'DB connected':'Memory mode';save();}
function brief(){const open=state.tasks.filter(t=>t.status!=='open'||true).filter(t=>t.status!=='done').length;const op=state.operator||{};return {pressure:op.pressure_score??68,top:clean(op.top_priority||'Three open loops need executive control today.'),next:clean(op.next_best_action||'Lock the proposal review, confirm the decision owner, and send the follow-up.'),open};}
function todayPage(){const b=brief();return `<section class="grid2"><div class="hero"><span class="kicker">Command Centre / Flight Deck</span><h3>${esc(b.next)}</h3><p>${esc(b.top)} Start with what has your attention. I’ll help identify the first move.</p><div class="cockpit"><div class="dial"><small>Pressure</small><strong>${b.pressure}</strong><p>Operator load</p></div><div class="dial"><small>Open Actions</small><strong>${b.open}</strong><p>Unclosed loops</p></div><div class="dial"><small>Assets</small><strong>${state.assets.length}</strong><p>Ready to use</p></div></div><div class="actions"><button class="btn orange" onclick="setPage('actions')">Start Action Queue</button><button class="btn" onclick="setPage('run')">Open Command Room</button><button class="btn green" onclick="dbTestWrite()">Test DB Save</button></div></div><div class="card"><div class="cardHead"><div><span class="kicker">Today’s Operating Flow</span><h3>Brief → Decide → Execute → Follow Up</h3></div><span class="tag high">Live</span></div><div class="workflow"><div class="step active"><small>01</small><b>Brief</b><p>Know the pressure and priority.</p></div><div class="step"><small>02</small><b>Decide</b><p>Pick the move and owner.</p></div><div class="step"><small>03</small><b>Execute</b><p>Create the asset or action.</p></div><div class="step"><small>04</small><b>Follow Up</b><p>Close the loop.</p></div></div><div class="list">${state.tasks.filter(t=>t.status!=='done').slice(0,4).map((t,i)=>itemHTML(t,i)).join('')}</div></div></section><div class="grid3" style="margin-top:18px"><div class="card"><span class="kicker">Decision Needed</span><h3>Confirm the owner</h3><p>Tell me what has your attention and I’ll turn it into movement.</p></div><div class="card"><span class="kicker">Revenue Lens</span><h3>Move discussion to decision</h3><p>The system is useful only when it compresses time from conversation to action.</p></div><div class="card"><span class="kicker">System Win</span><h3>Save every output</h3><p>Runs, actions, decisions, and assets should persist to DB when Supabase is configured.</p></div></div>`}
function itemHTML(t,i){return `<div class="item ${t.status==='done'?'done':''}" onclick="toggleTask(${i})"><div class="check">${t.status==='done'?'✓':''}</div><div><b>${esc(clean(t.task||t))}</b><p style="margin:3px 0 0;color:var(--muted)">${t.owner||'Owner: Executive'} · ${t.due||'Due: today'}</p></div><span class="tag ${(t.priority||'').toLowerCase()}">${t.priority||'Medium'}</span></div>`}
function commandPage(){return `<section class="commandRoom"><div class="history"><span class="kicker">Run History</span><h3 style="margin-top:8px">Previous Work</h3>${state.runs.length?state.runs.slice(0,12).map(r=>`<div class="historyItem" onclick="openRun(${state.runs.indexOf(r)})"><b>${esc(clean(r.input||r.asset?.title||'Run'))}</b><span class="tag">${esc(r.priority||'Medium')}</span><p>${esc(clean(r.next_move||r.what_to_do_now||''))}</p></div>`).join(''):'<p>No runs yet. Use the composer to create real work output.</p>'}</div><div class="chat"><div class="messages" id="messages"><div class="bubble assistant"><b>Command Room Ready</b>\nTell me the real job: proposal, meeting prep, email, decision, content, or operating plan. I will return a decision, next move, actions, risk, asset, and follow-up.</div></div><div class="composer"><textarea id="chatInput" placeholder="Example: Build a proposal for an Ontario auto loan dealership that needs SEO + Google Ads CPA under $100."></textarea><button class="primary" onclick="runChat()">Run</button></div></div></section>`}

elligence\n\nPressure Score: ${brief().pressure}\nTop Priority: ${brief().top}\nNext Best Action: ${brief().next}\n\nCounts:\nOpen tasks: ${state.tasks.filter(t=>t.status!=='done').length}\nAssets ready: ${state.assets.length}\nRuns: ${state.runs.length}`,risk:'Risk Monitor\n\nHigh Risk: The system becomes a dashboard instead of an operator.\n\nControl:\nEvery section must answer: what matters, what should happen, who owns it, and what gets saved.',strategy:'Strategy Board\n\nOperating thesis: Executive Assistant OS wins by compressing messy executive input into decisions, assets, action queues, and follow-ups.\n\nNext strategy move: make every page a useful tool, not a static panel.',team:'Team Pulse\n\nOwners to track:\n- Executive: final decision\n- Operator: action queue\n- Sales/Marketing: proposal and follow-up\n- Engineering: DB, routes, reliability\n\nDependency: Every task needs owner + date.',finance:'Financial Snapshot\n\nValue levers:\n- Faster proposal cycle\n- Fewer missed follow-ups\n- Better meeting conversion\n- Less executive admin drag\n- Better visibility into revenue tasks',status:JSON.stringify({version:VERSION,backend:state.backend.version||'checking',routes:['/run','/db-status','/db-items','/db-test-write','/operator-scan','/workspace-state'],provider:state.backend.openai?.model||'openai'},null,2)}[id]||'Section content'; if(id==='actions')return actionPage(); if(id==='database')return databasePage(); return `<section class="section"><div class="canvas"><div class="sectionHeader"><div><span class="kicker">${esc(title)}</span><h3>${esc(sub)}</h3></div><div class="actions" style="margin-top:0"><button class="btn" onclick="saveAction('${id}')">Save Action</button><button class="btn orange" onclick="saveDecision('${id}')">Save Decision</button></div></div><div class="contentBox">${esc(content)}</div>${id==='notes'?`<div class="commandBar" style="grid-template-columns:1fr 120px;margin-top:16px"><input id="noteInput" placeholder="Capture context... async function runOperatingLayer(){
  const input=$('opInput')?.value?.trim();
  const mode=$('opMode')?.value||'command';
  if(!input){toast('Enter a real executive situation first');return}
  toast('Running V36010 operating layer...');
  try{
    const data=await api('/operating-layer',{method:'POST',body:JSON.stringify({input,mode,account_id:'default',user_id:'owner'})});
    state.operating=data;
    consumeRun({
      decision:data.decision,
      next_move:data.next_move||data.what_to_do_now,
      actions:data.execution_queue||data.actions,
      risk:data.risk,
      priority:data.priority,
      asset:{title:'V36010 Operating Layer',type:'operating_layer',content:JSON.stringify(data,null,2)},
      operator_state:data.operator_state,
      workspace:data.workspace
    },input);
    render();
    toast('Operating layer complete');
  }catch(e){toast('Operating layer failed: '+e.message)}
}

async function bootstrap(){try{state.backend=await api('/debug')}catch(e){state.backend={error:e.message}}try{state.operator=(await api('/operator-scan')).operator_state||{}}catch(e){}try{const ws=await api('/workspace-state');state.workspace=ws.active_workspace||{}}catch(e){}try{const demo=await api('/demo-state');if(!state.operator.next_best_action)state.operator={...state.operator,next_best_action:demo.brief.next_move,top_priority:demo.brief.headline,pressure_score:demo.brief.pressure_score};}catch(e){}await loadDB(false);render();toast('System checked')}
async function loadDB(show){try{state.db=await api('/db-status');const r=await api('/db-items?limit=20');state.dbItems=r.items||[]}catch(e){state.db={configured:false,message:'DB endpoints require backend V35120+ / env vars'};state.dbItems=[]}if(show){render();toast('DB refreshed')}}
async function dbTestWrite(){try{const r=await api('/db-test-write',{method:'POST',body:JSON.stringify({source:'frontend',version:VERSION,event:'manual-test-write',created_at:new Date().toISOString()})});toast(r.ok||r.status==='ok'?'DB write saved':'DB fallback / memory mode')}catch(e){toast('DB route unavailable')}await loadDB(false);render()}
function consumeRun(data,input){const run={...data,input,time:new Date().toISOString()};state.runs.unshift(run);(data.actions||[]).slice(0,8).reverse().forEach((a,i)=>state.tasks.unshift({task:clean(a),priority:data.priority||'High',status:'open',owner:'Executive',due:'Today'}));if(data.asset?.content)state.assets.unshift({title:clean(data.asset.title||'Generated Asset'),type:data.asset.type||'asset',content:data.asset.content});if(data.workspace&&Object.keys(data.workspace).length)state.workspace=data.workspace;if(data.operator_state)state.operator=data.operator_state;save();}
async function runOS(){const input=$('command').value.trim();if(!input){toast('Type the work first');return}toast('Running real executive response...');try{const data=await api('/run',{method:'POST',body:JSON.stringify({input,mode:$('mode').value,provider:'auto',output_type:$('mode').value})});consumeRun(data,input);$('command').value='';setPage('today');toast('Run complete: actions + asset saved')}catch(e){toast('Run failed: '+e.message)}render()}
async function runChat(){const input=$('chatInput').value.trim();if(!input)return;const msg=$('messages');msg.innerHTML+=`<div class="bubble user">${esc(input)}</div>`;$('chatInput').value='';try{const data=await api('/run',{method:'POST',body:JSON.stringify({input,mode:'execution',provider:'auto'})});consumeRun(data,input);msg.innerHTML+=`<div class="bubble assistant"><b>Next Move</b>\n${esc(clean(data.next_move))}\n\n<b>Decision</b>\n${esc(clean(data.decision))}\n\n<b>Actions</b>\n${esc((data.actions||[]).map(a=>'• '+clean(a)).join('\n'))}\n\n<b>Risk</b>\n${esc(clean(data.risk))}</div>`;msg.scrollTop=msg.scrollHeight}catch(e){msg.innerHTML+=`<div class="bubble assistant">Run failed: ${esc(e.message)}</div>`}renderRail();renderNav();}
async function saveDecision(name){try{await api('/save-decision',{method:'POST',body:JSON.stringify({page:name,decision:`Decision saved from ${name}`,priority:'High',created_at:new Date().toISOString()})});toast('Decision saved')}catch(e){toast('Decision saved locally')}}
async function saveAction(name){state.tasks.unshift({task:`Advance ${copy[name]?.[0]||name}: confirm owner, deadline, and next output.`,priority:'Medium',status:'open'});try{await api('/save-action',{method:'POST',body:JSON.stringify(state.tasks[0])})}catch(e){}render();toast('Action saved')}
render();bootstrap();

async function runExecutiveIntelligence(){
  const input = prompt("Enter executive situation:");
  if(!input) return;
  try{
    const res = await fetch(API_BASE + "/executive-intelligence",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({input})
    });
    const data = await res.json();
    alert(
      "Priority: " + data.priority + "\n\n" +
      "What Matters Now:\n" + data.what_matters_now + "\n\n" +
      "Executive Recommendation:\n" + data.executive_recommendation
    );
  }catch(e){
    alert("Executive Intelligence failed.");
  }
}


async function runPressureAttention(){
  const input = prompt("What has your attention right now? Example: too many client follow-ups, proposal due, sales not closing, team bottleneck.");
  if(!input) return;
  try{
    const res = await fetch(API_BASE + "/pressure-attention",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({input,account_id:"default",user_id:"owner"})
    });
    const data = await res.json();
    alert(
      "Pressure: " + data.pressure_level + " (" + data.pressure_score + "/100)" +
      "\n\nWhat matters now:\n" + data.what_matters_now +
      "\n\nTop 3:\n- " + (data.top_3_actions || []).join("\n- ") +
      "\n\nFollow-up:\n- " + (data.follow_up_before_end_of_day || []).join("\n- ")
    );
  }catch(e){
    alert("Pressure Attention failed: " + e.message);
  }
}


async function loadFirstMessageV36080(){
  try{
    const res = await fetch(API_BASE + "/first-load", {cache:"no-store"});
    const data = await res.json();
    const greeting = data.greeting || "Hey Will, let’s Rock n Roll today.";
    const subtext = data.subtext || "Tell me what has your attention and I’ll help turn it into movement.";
    const setText = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
    setText("whatNow", greeting);
    setText("summaryTop", subtext);
    setText("todayOne", data.what_to_do_now || "Start with the one thing that has your attention.");
    setText("riskOne", data.risk || "No active risk yet.");
  }catch(e){
    const el = document.getElementById("whatNow");
    if(el) el.textContent = "Hey Will, let’s Rock n Roll today.";
  }
}
setTimeout(loadFirstMessageV36080, 250);


async function runQualityPolish(){
  const input = prompt("Describe your situation briefly.");
  if(!input) return;

  try{
    const res = await fetch(API_BASE + "/quality-polish",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({input})
    });

    const data = await res.json();

    alert(
      "WHAT MATTERS FIRST\n\n" +
      data.what_matters_first +
      "\n\nTOP 3\n- " +
      (data.top_3 || []).join("\n- ") +
      "\n\nFOLLOW-UP\n- " +
      (data.follow_up || []).join("\n- ")
    );

  }catch(e){
    alert("Quality Polish failed.");
  }
}
