<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Engine</title>
<style>
body { font-family: Arial; margin:0; background:#f7f7f7;}
.container { max-width:800px; margin:auto; padding:20px;}
.input-box {
    width:100%; padding:20px; font-size:16px;
    border-radius:12px; border:1px solid #ddd;
}
button {
    margin-top:10px; padding:12px 20px;
    background:#ff5a2c; color:white; border:none;
    border-radius:8px; cursor:pointer;
}
.message { margin-top:20px; }
.user { background:#2563eb; color:white; padding:12px; border-radius:10px;}
.ai { background:white; padding:15px; border-radius:10px; margin-top:10px;}
.next { border-left:4px solid orange; padding-left:10px; font-weight:bold;}
.hidden { display:none; }
.link { color:#2563eb; cursor:pointer; font-size:14px;}
</style>
</head>
<body>

<div class="container">

<h2>How can I help you execute today?</h2>

<textarea id="input" class="input-box" placeholder="Tell the engine what needs to get done..."></textarea>
<button onclick="run()">Run Engine</button>

<div id="thread"></div>

</div>

<script>
async function run() {
    const input = document.getElementById("input").value;

    const thread = document.getElementById("thread");

    thread.innerHTML += `
        <div class="message user">${input}</div>
        <div class="message ai">Thinking...</div>
    `;

    const res = await fetch("https://executive-engine-os-v2.onrender.com/run", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({input})
    });

    const data = await res.json();

    let output = data.output;

    thread.innerHTML += `
        <div class="message ai">
            <div class="next">${output}</div>
            <div class="link" onclick="this.nextElementSibling.classList.toggle('hidden')">
                See full breakdown
            </div>
            <div class="hidden">
                <pre>${output}</pre>
            </div>
        </div>
    `;

    window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
