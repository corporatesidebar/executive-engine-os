<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Engine V17</title>
<style>
:root{
  --bg:#f5f8fc;
  --card:#ffffff;
  --nav:#061a3a;
  --blue:#0f62fe;
  --orange:#ff5a1f;
  --text:#0f172a;
  --line:#e2e8f0;
}
body{margin:0;font-family:Inter;background:var(--bg)}
.app{display:grid;grid-template-columns:240px 1fr 340px;height:100vh}

/* SIDEBAR */
.sidebar{background:var(--nav);color:#fff;padding:20px}
.logo{font-weight:800;margin-bottom:20px}
.nav-item{padding:10px;border-radius:8px;margin-bottom:6px;cursor:pointer}
.nav-item:hover{background:var(--blue)}

/* MAIN */
.main{display:flex;flex-direction:column}

/* HERO + INPUT */
.hero{
  padding:20px;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.hero h2{margin:0 0 10px}
.input-wrap{
  margin-top:10px;
}
textarea{
  width:100%;
  height:90px;
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px;
}
.controls{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}
select{
  padding:8px;
  border-radius:8px;
  border:1px solid var(--line);
}
button{
  background:var(--orange);
  color:#fff;
  border:0;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  overflow:auto;
  padding:20px;
}
.message{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}
.next{font-weight:700;margin-bottom:6px}
.actions{margin-top:10px}
.action{padding:10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px}

/* RIGHT */
.right{
  background:#f0f5fb;
  padding:10px;
}
.panel{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="app">

<div class="sidebar">
<div class="logo">Executive Engine</div>
<div class="nav-item">Command Center</div>
<div class="nav-item">Tasks</div>
<div class="nav-item">Memory</div>
</div>

<div class="main">

<div class="hero">
<h2>What needs to get done?</h2>

<div class="input-wrap">
<textarea id="input" placeholder="Type your situation..."></textarea>

<div class="controls">
<select id="mode">
<option>Execution</option>
<option>Strategy</option>
<option>Decision</option>
</select>
<button onclick="run()">Run Engine</button>
</div>
</div>

</div>

<div id="chat" class="chat"></div>

</div>

<div class="right">
<div class="panel">Tasks will appear here</div>
<div class="panel">Memory</div>
</div>

</div>

<script>
const ENDPOINT="https://executive-engine-os-v2.onrender.com/run"

function run(){
 const val=document.getElementById("input").value
 if(!val) return

 fetch(ENDPOINT,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({input:val})
 })
 .then(r=>r.json())
 .then(d=>render(d))
}

function render(d){
 const chat=document.getElementById("chat")

 const actions=(d.actions||[]).map(a=>"<div class='action'>"+a+"</div>").join("")

 const html=`
 <div class="message">
   <div class="next">${d.next_move}</div>
   <div>${d.decision}</div>
   <div class="actions">${actions}</div>
 </div>
 `

 chat.insertAdjacentHTML("beforeend",html)
 chat.scrollTop=chat.scrollHeight
}
</script>

</body>
</html>
