<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Executive Engine V18</title>
<style>
body{margin:0;font-family:Inter;background:#f5f8fc}
.app{display:grid;grid-template-columns:240px 1fr 320px;height:100vh}

/* SIDEBAR */
.sidebar{background:#061a3a;color:#fff;padding:20px}
.logo{font-weight:800;margin-bottom:20px}

/* MAIN */
.main{display:flex;flex-direction:column}

/* INPUT */
.hero{padding:20px;background:#fff;border-bottom:1px solid #ddd}
textarea{width:100%;height:90px;border-radius:10px;border:1px solid #ddd;padding:10px}
button{margin-top:10px;background:#ff5a1f;color:#fff;border:0;padding:10px 14px;border-radius:8px}

/* CHAT */
.chat{flex:1;overflow:auto;padding:20px}
.message{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;border:1px solid #eee}
.next{font-weight:700}

/* RIGHT PANEL */
.right{background:#eef3f9;padding:10px;overflow:auto}
.panel{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
.task{display:flex;gap:8px;padding:6px 0}
.task.done{text-decoration:line-through;opacity:.5}
</style>
</head>
<body>

<div class="app">

<div class="sidebar">
<div class="logo">Executive Engine</div>
</div>

<div class="main">

<div class="hero">
<h2>What needs to get done?</h2>
<textarea id="input"></textarea>
<button onclick="run()">Run</button>
</div>

<div id="chat" class="chat"></div>

</div>

<div class="right">

<div class="panel">
<h3>Tasks</h3>
<div id="tasks"></div>
</div>

<div class="panel">
<h3>Memory</h3>
<div id="memory"></div>
</div>

</div>

</div>

<script>
const API="https://executive-engine-os-v2.onrender.com"

function run(){
 const val=document.getElementById("input").value
 if(!val)return

 fetch(API+"/run",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({input:val})
 })
 .then(r=>r.json())
 .then(d=>{
  renderChat(d)
  renderTasks(d.actions||[])
  loadMemory()
 })
}

function renderChat(d){
 const chat=document.getElementById("chat")
 const html=`
 <div class="message">
  <div class="next">${d.next_move}</div>
  <div>${d.decision}</div>
 </div>`
 chat.insertAdjacentHTML("beforeend",html)
 chat.scrollTop=chat.scrollHeight
}

function renderTasks(actions){
 const el=document.getElementById("tasks")
 el.innerHTML=actions.map(a=>`
  <div class="task" onclick="this.classList.toggle('done')">${a}</div>
 `).join("")
}

function loadMemory(){
 fetch(API+"/memory")
 .then(r=>r.json())
 .then(d=>{
  const el=document.getElementById("memory")
  const items=d.memory||[]
  el.innerHTML=items.map(m=>`
   <div style="padding:6px 0;border-bottom:1px solid #eee">
    <strong>${m.next_move}</strong><br>
    <small>${m.input}</small>
   </div>
  `).join("")
 })
}

loadMemory()
</script>

</body>
</html>
