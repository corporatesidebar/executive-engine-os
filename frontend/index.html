<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Executive Engine OS V36120</title>
<style>
:root{--bg:#f7f8fb;--panel:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--nav:#0b1220;--blue:#2563eb;--orange:#f97316;--green:#16a34a;--shadow:0 18px 45px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}.app{display:grid;grid-template-columns:300px 1fr;height:100vh}.sidebar{background:var(--nav);color:#fff;display:flex;flex-direction:column}.sideTop{padding:18px;border-bottom:1px solid rgba(255,255,255,.08)}.brand{display:flex;gap:10px;align-items:center}.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--blue),#60a5fa);display:grid;place-items:center;font-weight:950}.brand h1{font-size:15px;margin:0}.brand p{font-size:11px;margin:3px 0 0;color:#aab8cf}.newBtn{width:100%;margin-top:16px;border:0;border-radius:12px;background:var(--orange);color:#fff;font-weight:900;padding:12px;cursor:pointer}.search{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08)}.search input{width:100%;background:#111827;border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:10px;padding:11px;outline:none}.label{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#8fa0bd;font-weight:950;margin:12px 18px 8px}.actionList{overflow:auto;padding:0 12px 12px;flex:1}.actionItem{padding:12px;border-radius:12px;cursor:pointer;margin-bottom:8px;border:1px solid transparent}.actionItem:hover,.actionItem.active{background:#16233a;border-color:rgba(255,255,255,.08)}.actionItem strong{display:block;font-size:13px;line-height:1.25}.actionItem span{display:block;color:#9fb0cc;font-size:11px;margin-top:5px}.sideFoot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#9fb0cc}.main{height:100vh;display:flex;flex-direction:column;min-width:0}.topbar{height:72px;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex:0 0 auto}.title h2{margin:0;font-size:21px;letter-spacing:-.04em}.title p{margin:4px 0 0;color:var(--muted);font-size:12px}.status{font-size:12px;color:#166534;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:999px;padding:8px 12px;font-weight:900}.content{flex:1;overflow:auto;padding:24px 24px 170px}.wrap{max-width:1080px;margin:0 auto}.hero{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px}.hero h3{font-size:30px;margin:8px 0;letter-spacing:-.06em}.hero p{color:#dbeafe;line-height:1.45;margin:0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px}.card.click{cursor:pointer}.card.click:hover{border-color:#93c5fd;transform:translateY(-1px)}.kicker{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:950}.card h3{margin:8px 0;font-size:18px;letter-spacing:-.03em}.card p{color:var(--muted);line-height:1.45}.actionHeader{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:16px}.actionHeader h2{font-size:30px;letter-spacing:-.06em;margin:0}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:12px;color:var(--muted);font-weight:900;background:#fff}.summaryGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.shortCard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}.shortCard h4{margin:8px 0;font-size:16px}.shortCard p{color:var(--muted)}.detailToggle{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;font-weight:900;cursor:pointer}.detail{display:none}.detail.show{display:block}.editorGrid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.editor{min-height:340px;width:100%;border:1px solid var(--line);border-radius:16px;padding:16px;font-family:inherit;font-size:14px;line-height:1.5;resize:vertical;outline:none}.thread{max-height:390px;overflow:auto}.msg{padding:12px 14px;border-radius:14px;margin-bottom:10px;line-height:1.45;font-size:14px}.user{background:#eff6ff;margin-left:30px}.system{background:#fff;border:1px solid var(--line);margin-right:30px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;font-weight:900;cursor:pointer}.btn.orange{background:var(--orange);color:#fff;border-color:var(--orange)}.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}.inputDock{position:fixed;left:300px;right:0;bottom:0;background:rgba(247,248,251,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:14px 22px}.inputBox{max-width:980px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:12px}textarea#capture{width:100%;min-height:62px;border:0;outline:none;resize:none;font-family:inherit;font-size:15px;line-height:1.45}.chips{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:10px}.chip{border:1px solid var(--line);border-radius:999px;background:#fff;padding:8px 10px;font-weight:850;font-size:12px;cursor:pointer}.send{margin-left:auto;background:var(--nav);color:#fff;border-color:var(--nav)}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.inputDock{left:0}.grid,.summaryGrid,.editorGrid{grid-template-columns:1fr}.content{padding:18px 14px 170px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sideTop">
      <div class="brand"><div class="logo">EE</div><div><h1>Executive Engine OS</h1><p>V36120 ACTIONS UX</p></div></div>
      <button class="newBtn" onclick="newAction()">+ New Action</button>
    </div>
    <div class="search"><input id="search" placeholder="Search actions..." oninput="renderSidebar()"/></div>
    <div class="label">ACTIONS</div>
    <div class="actionList" id="actionList"></div>
    <div class="sideFoot">Capture note → ACTION → editable draft → next move.</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="title"><h2 id="pageTitle">Command Centre</h2><p id="pageSub">Here’s what needs your attention.</p></div>
      <div class="status" id="status">Checking backend</div>
    </header>

    <section class="content" id="content"></section>

    <div class="inputDock">
      <div class="inputBox">
        <textarea id="capture" placeholder="Quick capture: meeting notes, proposal idea, client issue, task, follow-up, strategy..."></textarea>
        <div class="chips">
          <button class="chip" onclick="setType('meeting')">Meeting</button>
          <button class="chip" onclick="setType('proposal')">Proposal</button>
          <button class="chip" onclick="setType('strategy')">Strategy</button>
          <button class="chip" onclick="setType('follow_up')">Follow-Up</button>
          <button class="chip" onclick="setType('execution')">Execution</button>
          <button class="chip" onclick="setType('notes')">Notes</button>
          <button class="chip send" onclick="captureAction()">Create / Add</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const API_BASE="https://executive-engine-os.onrender.com";
const VERSION="36120-actions-operating-ux";
let selectedType="general";
let activeId=null;
let actions=JSON.parse(localStorage.getItem("ee_actions_v36120")||"[]");

function save(){localStorage.setItem("ee_actions_v36120",JSON.stringify(actions.slice(0,120)))}
function uid(){return "act_"+Date.now()+"_"+Math.random().toString(16).slice(2)}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function setType(t){selectedType=t;document.getElementById("capture").focus()}
function current(){return actions.find(w=>w.id===activeId)}
function newAction(){activeId=null;renderCommand()}
function renderSidebar(){
  const q=(document.getElementById("search")?.value||"").toLowerCase();
  const list=document.getElementById("actionList");
  const filtered=actions.filter(w=>(w.title+" "+w.category+" "+w.input).toLowerCase().includes(q));
  list.innerHTML=filtered.map(w=>`<div class="actionItem ${w.id===activeId?'active':''}" onclick="openAction('${w.id}')"><strong>${esc(w.title)}</strong><span>${esc(w.category)} · ${new Date(w.updated_at).toLocaleDateString()}</span></div>`).join("")||'<div class="actionItem"><strong>No actions yet</strong><span>Capture a note to start.</span></div>';
}
function renderCommand(){
  activeId=null;
  document.getElementById("pageTitle").textContent="Command Centre";
  document.getElementById("pageSub").textContent="Here’s what needs your attention.";
  const recent=actions.slice(0,4);
  document.getElementById("content").innerHTML=`<div class="wrap">
    <div class="hero">
      <span class="kicker">Command Centre</span>
      <h3>Hey Will, let’s Rock n Roll today.</h3>
      <p>Drop messy notes, meeting context, proposals, follow-ups, or ideas. I’ll turn them into ACTIONS with short summary, editable draft, and next move.</p>
    </div>
    <div class="grid">
      <div class="card click" onclick="document.getElementById('capture').focus()"><span class="kicker">Start</span><h3>Quick Capture</h3><p>Type the messy note. The system organizes it.</p></div>
      <div class="card click" onclick="document.getElementById('capture').value='Meeting notes auto loan client. Met with Bob. He wants to up ad spend to 50k/mo. Website changes: make form smoother, change button to orange, future redesign. Meeting next week 3pm at his office to strategize quality leads and conversion rate. He asked for proposal.';document.getElementById('capture').focus()"><span class="kicker">Example</span><h3>Auto Loan Client Notes</h3><p>Load the Bob meeting example.</p></div>
      ${recent.map(w=>`<div class="card click" onclick="openAction('${w.id}')"><span class="kicker">${esc(w.category)}</span><h3>${esc(w.title)}</h3><p>${esc(w.short?.next_move||w.short?.summary||'Continue action')}</p></div>`).join("")}
    </div>
  </div>`;
  renderSidebar();
}
function openAction(id){
  activeId=id;
  const w=current();
  if(!w){renderCommand();return}
  document.getElementById("pageTitle").textContent=w.title;
  document.getElementById("pageSub").textContent=`${w.category} ACTION · short version first`;
  document.getElementById("content").innerHTML=`<div class="wrap">
    <div class="actionHeader">
      <div><h2>${esc(w.title)}</h2><span class="pill">${esc(w.category)}</span></div>
      <button class="detailToggle" onclick="toggleDetail()">View Detailed Brief</button>
    </div>
    <div class="summaryGrid">
      <div class="shortCard"><span class="kicker">Summary</span><h4>${esc(w.short?.summary||'Captured action')}</h4></div>
      <div class="shortCard"><span class="kicker">Next Move</span><h4>${esc(w.short?.next_move||'Review and continue.')}</h4></div>
      <div class="shortCard"><span class="kicker">Risk</span><p>${esc(w.short?.risk||'Context gets lost if it stays loose.')}</p></div>
      <div class="shortCard"><span class="kicker">Open Loops</span><p>${esc((w.short?.open_loops||[]).join(' · ')||'None yet')}</p></div>
    </div>
    <div class="detail" id="detail">
      <div class="editorGrid">
        <div class="card">
          <span class="kicker">Editable Draft / Notes</span>
          <textarea class="editor" id="docEditor">${esc(w.details?.draft||w.input||'')}</textarea>
          <div class="actions">
            <button class="btn blue" onclick="saveDoc()">Save</button>
            <button class="btn" onclick="aiPolish()">AI Polish</button>
            <button class="btn" onclick="clientReady()">Client Ready</button>
            <button class="btn" onclick="shortenDoc()">Shorten</button>
          </div>
        </div>
        <div class="card">
          <span class="kicker">Thread</span>
          <div class="thread">${(w.messages||[]).map(m=>`<div class="msg ${m.role==='user'?'user':'system'}">${esc(m.content)}</div>`).join("")}</div>
          <span class="kicker">Missing Info</span>
          <p>${esc((w.details?.missing_info||[]).join(', ')||'Nothing obvious.')}</p>
          <span class="kicker">Tasks</span>
          <ul>${(w.tasks||[]).map(a=>`<li>${esc(a.task||a)}</li>`).join("")}</ul>
        </div>
      </div>
    </div>
  </div>`;
  renderSidebar();
}
function toggleDetail(){document.getElementById("detail")?.classList.toggle("show")}
function localAction(input, type){
  const title=input.toLowerCase().includes("bob")&&input.toLowerCase().includes("auto")?"Bob — Auto Loan Strategy":(input.split(/\s+/).slice(0,7).join(" ")||"New Action");
  return {id:uid(),title,category:type,input,updated_at:new Date().toISOString(),short:{summary:"Captured and organized into an ACTION.",what_matters:"Keep this tied to one action.",next_move:"Review the draft, fill gaps, and continue.",risk:"Loose notes create missed follow-up.",open_loops:["Confirm missing person/company/scope if needed."]},details:{draft:"ACTION NOTES\n\n"+input+"\n\nNEXT MOVE\nReview, edit, and tell the system what to improve.",missing_info:["Company/person if relevant"]},messages:[{role:"user",content:input},{role:"system",content:"ACTION created. Short version first; details are editable."}],tasks:[{task:"Review action and add missing details.",status:"open",priority:"High"}]}
}
async function captureAction(){
  const input=document.getElementById("capture").value.trim();
  if(!input){alert("Add a quick note first.");return}
  let w=null;
  try{
    const res=await fetch(API_BASE+"/action-capture",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({input,category:selectedType,account_id:"default",user_id:"owner"})});
    const data=await res.json();
    const a=data.action;
    w={id:a.action_id,title:a.title,category:a.category,input:a.input,short:a.short,details:a.details,messages:a.messages,tasks:a.tasks,updated_at:a.updated_at||new Date().toISOString()};
  }catch(e){w=localAction(input,selectedType)}
  actions.unshift(w);actions=dedupe(actions);activeId=w.id;document.getElementById("capture").value="";save();openAction(w.id)
}
function dedupe(arr){const seen=new Set();return arr.filter(w=>{if(seen.has(w.id))return false;seen.add(w.id);return true}).slice(0,120)}
function saveDoc(){const w=current();if(!w)return;w.details=w.details||{};w.details.draft=document.getElementById("docEditor").value;w.updated_at=new Date().toISOString();save();alert("Saved.")}
function aiPolish(){const ed=document.getElementById("docEditor");ed.value=ed.value+"\n\nAI Polish Notes:\n- Make the next step clear.\n- Confirm owner, deadline, and decision.\n- Remove vague language.";saveDoc()}
function clientReady(){const ed=document.getElementById("docEditor");ed.value="Client-Ready Draft\n\n"+ed.value+"\n\nNext Step:\nPlease confirm the preferred direction and timing.";saveDoc()}
function shortenDoc(){const ed=document.getElementById("docEditor");ed.value=ed.value.split(/\n/).filter(Boolean).slice(0,8).join("\n");saveDoc()}
async function health(){try{const r=await fetch(API_BASE+"/health",{cache:"no-store"});const d=await r.json();document.getElementById("status").textContent=d.status==="ok"||d.status==="online"?"Backend Online":"Check Backend"}catch(e){document.getElementById("status").textContent="Offline"}}
health();renderCommand();
</script>
</body>
</html>
