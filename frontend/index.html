<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Engine</title><link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo"><div class="mark"><span>E</span><span>E</span></div></div>
  <nav class="nav">
    <button class="nav-btn active" data-page="command"><span>⌂</span>Command Centre</button>
    <button class="nav-btn" data-page="meetings"><span>□</span>Meetings</button>
    <button class="nav-btn" data-page="proposals"><span>▣</span>Proposals</button>
    <button class="nav-btn" data-page="strategy"><span>◌</span>Strategy</button>
    <button class="nav-btn" data-page="followups"><span>↗</span>Follow-Ups</button>
    <button class="nav-btn" data-page="tasks"><span>☑</span>Tasks</button>
    <button class="nav-btn" data-page="documents"><span>▤</span>Documents</button>
    <button class="nav-btn" data-page="contacts"><span>◎</span>Contacts</button>
    <button class="nav-btn" data-page="calendar"><span>▢</span>Calendar</button>
    <button class="nav-btn" data-page="search"><span>⌕</span>Search</button>
  </nav>
  <div class="side-bottom">
    <button class="notice">♢ Notifications <b id="noticeCount">0</b></button>
    <div class="profile"><div class="avatar">WS</div><div><strong>Will Stewart</strong><small>Executive</small></div></div>
  </div>
</aside>

<main class="main">
  <header><div><h1 id="pageTitle">Command Centre</h1><p id="pageSub">What would you like to accomplish?</p></div><button class="bell">♢</button></header>
  <section class="scroll">
    <section class="command-card">
      <div class="kicker">COMMAND CENTRE</div>
      <h2>What are we building?</h2>
      <p>Your Strategic Operator</p>
      <div class="input-card">
        <textarea id="commandInput" placeholder="Type or speak your directive..."></textarea>
        <div class="input-footer"><div class="tools"><span>⌘</span><span>🎙</span><i></i><span>✦ AI Assistant</span></div><button id="runCommand">Let's make it happen</button></div>
      </div>
    </section>

    <section class="examples">
      <div class="kicker">EXAMPLES YOU CAN TRY</div>
      <div class="chips">
        <button data-example="Meeting with Bob Thursday 3PM">Meeting with Bob Thursday 3PM</button>
        <button data-example="Need proposal for ABC Roofing">Need proposal for ABC Roofing</button>
        <button data-example="Client upset about lead quality">Client upset about lead quality</button>
        <button data-example="Q4 sales strategy">Q4 sales strategy</button>
        <button data-example="Follow up with investor">Follow up with investor</button>
        <button data-example="Plan marketing for next month">Plan marketing for next month</button>
      </div>
    </section>

    <section id="thread" class="thread"></section>

    <section class="priorities">
      <div class="kicker">TOP PRIORITIES</div>
      <div id="priorityList"></div>
    </section>

    <footer>Command Centre turns your thoughts into organized actions.</footer>
  </section>
</main>

<aside class="actions">
  <div class="actions-head"><h2>ACTIONS</h2><button id="viewAll">View All</button></div>
  <div class="search-row"><div class="search"><span>⌕</span><input id="actionSearch" placeholder="Search actions..."></div><button class="filter">≡</button></div>
  <div id="actionsList" class="actions-list"></div>
  <button id="viewAllBottom" class="view-bottom">View All Actions <span>→</span></button>
</aside>
</div>
<script src="./app.js"></script>
</body></html>
