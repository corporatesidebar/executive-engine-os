<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Engine</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    background: #f5f7fa;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h2 {
    margin-bottom: 10px;
}

textarea {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
}

.output {
    margin-top: 20px;
    background: #ffffff;
    padding: 15px;
    border-radius: 10px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
    <h2>Executive Engine</h2>

    <textarea id="input" placeholder="Type your decision or situation..."></textarea>

    <button onclick="run()">Run Engine</button>

    <div class="output" id="out"></div>
</div>

<script>
async function run() {
    const input = document.getElementById("input").value;

    const res = await fetch("https://executive-engine-os.onrender.com/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    document.getElementById("out").innerHTML =
        "<b>Outcome:</b> " + data.outcome + "<br>" +
        "<b>Risk:</b> " + data.risk + "<br>" +
        "<b>Action:</b> " + data.action + "<br>" +
        "<b>Priority:</b> " + data.priority;
}
</script>

</body>
</html>
