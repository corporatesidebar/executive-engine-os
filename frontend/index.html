<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive Engine OS</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #111827;
    }

    .app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 860px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      border-bottom: 1px solid #e5e7eb;
      background: #0f172a;
      color: #ffffff;
    }

    .header h1 { margin: 0 0 6px; font-size: 24px; }
    .header p { margin: 0; color: #cbd5e1; font-size: 14px; }

    .main { padding: 24px; }

    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      outline: none;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .hint { font-size: 12px; color: #6b7280; }

    button {
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .status {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
    }

    .status.loading {
      display: block;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .status.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .result {
      display: none;
      margin-top: 22px;
      border-top: 1px solid #e5e7eb;
      padding-top: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
    }

    .card.wide { grid-column: 1 / -1; }

    .card h2 {
      margin: 0 0 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .card p { margin: 0; line-height: 1.5; font-size: 15px; }

    ol { margin: 0; padding-left: 20px; line-height: 1.6; }

    @media (max-width: 700px) {
      .app { padding: 12px; align-items: stretch; }
      .shell { border-radius: 14px; }
      .grid { grid-template-columns: 1fr; }
      .actions { align-items: stretch; flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="header">
        <h1>Executive Engine OS</h1>
        <p>Decision-ready execution system</p>
      </header>
      <main class="main">
        <textarea id="input" placeholder="Tell the engine what needs to get done, decided, fixed, or prepared..."></textarea>
        <div class="actions">
          <div class="hint">Press Ctrl/Cmd + Enter to run</div>
          <button id="runBtn" type="button">Run Engine</button>
        </div>
        <div id="status" class="status"></div>
        <section id="result" class="result">
          <div class="grid">
            <div class="card wide"><h2>Decision</h2><p id="decision">—</p></div>
            <div class="card"><h2>Next Move</h2><p id="nextMove">—</p></div>
            <div class="card"><h2>Priority</h2><p id="priority">—</p></div>
            <div class="card wide"><h2>Actions</h2><ol id="actionsList"></ol></div>
            <div class="card wide"><h2>Risk</h2><p id="risk">—</p></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const API = "https://executive-engine-os.onrender.com";

    const input = document.getElementById("input");
    const runBtn = document.getElementById("runBtn");
    const statusBox = document.getElementById("status");
    const result = document.getElementById("result");
    const decision = document.getElementById("decision");
    const nextMove = document.getElementById("nextMove");
    const priority = document.getElementById("priority");
    const risk = document.getElementById("risk");
    const actionsList = document.getElementById("actionsList");

    function setStatus(type, message) {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function safeText(value) {
      if (value === null || value === undefined || value === "") return "—";
      if (Array.isArray(value)) return value.join(", ");
      if (typeof value === "object") return JSON.stringify(value);
      return String(value);
    }

    function safeActions(value) {
      if (Array.isArray(value)) return value.map(String).filter(Boolean);
      if (typeof value === "string" && value.trim()) return [value.trim()];
      return [];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render(data) {
      decision.textContent = safeText(data.decision);
      nextMove.textContent = safeText(data.next_move);
      priority.textContent = safeText(data.priority);
      risk.textContent = safeText(data.risk);

      const actions = safeActions(data.actions);
      actionsList.innerHTML = actions.length
        ? actions.map(action => "<li>" + escapeHtml(action) + "</li>").join("")
        : "<li>No actions returned.</li>";

      result.style.display = "block";
    }

    async function runEngine() {
      const text = input.value.trim();
      if (!text) {
        setStatus("error", "Enter something first.");
        return;
      }

      runBtn.disabled = true;
      runBtn.textContent = "Running...";
      setStatus("loading", "Engine running...");

      try {
        const response = await fetch(API + "/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: text, mode: "execution" })
        });

        if (!response.ok) throw new Error("Backend error: " + response.status);

        const data = await response.json();
        render(data);
        clearStatus();
      } catch (error) {
        setStatus("error", error.message || "Backend failed. Try again.");
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = "Run Engine";
      }
    }

    runBtn.addEventListener("click", runEngine);
    input.addEventListener("keydown", function(event) {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        event.preventDefault();
        runEngine();
      }
    });
  </script>
</body>
</html>
