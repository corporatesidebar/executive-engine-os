<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Engine</title>
</head>
<body style="font-family: Arial; background:#f5f7fa; padding:20px;">

<h2>Executive Decision Engine</h2>

<textarea id="input" placeholder="Enter your situation..." 
style="width:100%; height:120px; padding:10px;"></textarea>

<br><br>

<button onclick="run()" style="padding:10px 20px;">Execute</button>

<pre id="output" style="margin-top:20px;"></pre>

<script>
async function run() {
  const input = document.getElementById("input").value;

  const res = await fetch("https://executive-engine-os.onrender.com/run", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ input })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    "Outcome: " + data.outcome + "\n\n" +
    "Risk: " + data.risk + "\n\n" +
    "Action: " + data.action + "\n\n" +
    "Priority: " + data.priority;
}
</script>

</body>
</html>
