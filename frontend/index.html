<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Executive Engine</title>
<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
textarea { width:100%; height:120px; margin-top:10px; }
button { margin-top:10px; padding:10px; }
.box { margin-top:10px; padding:10px; background:#eee; }
</style>
</head>
<body>
<h1>Executive Decision Engine</h1>
<textarea id="input"></textarea>
<br>
<button onclick="runEngine()">Run Engine</button>
<div class="box">Decision: <span id="decision"></span></div>
<div class="box">Risk: <span id="risk"></span></div>
<div class="box">Actions: <span id="actions"></span></div>
<div class="box">Priority: <span id="priority"></span></div>
<script>
async function runEngine() {
  const input = document.getElementById("input").value;
  const res = await fetch("https://executive-engine-os-v2.onrender.com/run", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({input})
  });
  const data = await res.json();
  document.getElementById("decision").innerText = data.decision;
  document.getElementById("risk").innerText = data.risk;
  document.getElementById("actions").innerText = (data.action_items||[]).join(", ");
  document.getElementById("priority").innerText = data.priority;
}
</script>
</body>
</html>
