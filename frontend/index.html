<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executive Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h2>Executive OS</h2>
    <div class="mode mode-active">Strategy</div>
    <div class="mode">Decision</div>
    <div class="mode">Execution</div>
  </div>

  <div class="main">
    <h1>Executive Engine</h1>
    <div class="main-card">
      <textarea id="input" placeholder="What’s on your mind?"></textarea>
      <button onclick="runEngine()">Run Engine</button>

      <div class="output-box"><strong>Outcome:</strong> <span id="outcome">-</span></div>
      <div class="output-box"><strong>Risk:</strong> <span id="risk">-</span></div>
      <div class="output-box"><strong>Action:</strong> <span id="action">-</span></div>
      <div class="output-box"><strong>Priority:</strong> <span id="priority">-</span></div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
