<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Engine OS</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#fff;color:#0f172a}

/* LAYOUT */
.app{
  display:grid;
  grid-template-columns:240px 1fr 320px;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  background:#0f172a;
  color:#fff;
  padding:20px;
}
.sidebar h1{font-size:16px;margin-bottom:4px}
.sidebar p{font-size:12px;color:#94a3b8;margin-bottom:20px}
.nav div{padding:10px;border-radius:8px;cursor:pointer}
.nav div.active{background:#2563eb}

/* MAIN */
.main{
  display:flex;
  flex-direction:column;
  border-right:1px solid #e5e7eb;
}

/* HEADER */
.header{
  padding:20px;
  border-bottom:1px solid #e5e7eb;
  display:flex;
  justify-content:space-between;
}
.header h2{font-size:18px}
.badge{
  background:#ecfdf5;
  color:#16a34a;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

/* CHAT */
.chat{
  flex:1;
  overflow:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{display:flex}
.msg.user{justify-content:flex-end}
.msg.ai{justify-content:flex-start}

.bubble{
  max-width:70%;
  padding:14px;
  border-radius:12px;
  font-size:14px;
}
.user .bubble{background:#2563eb;color:#fff}
.ai .bubble{background:#f1f5f9}

/* INPUT */
.inputWrap{
  border-top:1px solid #e5e7eb;
  padding:15px;
}
textarea{
  width:100%;
  height:80px;
  border:1px solid #d1d5db;
  border-radius:10px;
  padding:10px;
}
button{
  margin-top:10px;
  background:#2563eb;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* RIGHT PANEL */
.right{
  background:#f8fafc;
  padding:20px;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h1>Executive Engine OS</h1>
  <p>Decision-ready execution system</p>

  <div class="nav">
    <div class="active">Command Center</div>
    <div>Daily Brief</div>
    <div>Decisions</div>
    <div>Meeting Prep</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Executive Flow System</h2>
    <div class="badge">LIVE</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputWrap">
    <textarea id="input" placeholder="Tell the engine what needs to get done..."></textarea>
    <button onclick="run()">Run Engine</button>
  </div>

</div>

<!-- RIGHT PANEL -->
<div class="right">
  <div class="card">Recent Decisions</div>
  <div class="card">Focus Today</div>
  <div class="card">AI Recommendations</div>
</div>

</div>

<script>
const API="https://executive-engine-os.onrender.com";
let messages=[];

function render(){
  const chat=document.getElementById("chat");
  chat.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+(m.role==="user"?"user":"ai");

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.innerText=m.content;

    div.appendChild(bubble);
    chat.appendChild(div);
  });
  chat.scrollTop=chat.scrollHeight;
}

async function run(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text)return;

  messages.push({role:"user",content:text});
  render();

  try{
    const res=await fetch(API+"/run",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({input:text,mode:"execution"})
    });

    const data=await res.json();

    const response=
`Decision:
${data.decision}

Next Move:
${data.next_move}

Actions:
${(data.actions||[]).join("\n")}

Risk:
${data.risk}

Priority:
${data.priority}`;

    messages.push({role:"ai",content:response});
    render();

    console.log("API:",data);

  }catch(e){
    messages.push({role:"ai",content:"Error connecting to backend"});
    render();
  }
}
</script>

</body>
</html>
