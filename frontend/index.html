<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Executive Engine OS</title>

<style>
:root{
  --blue:#0f62fe;
  --orange:#ff5a1f;
  --bg:#f5f8fc;
  --text:#0f172a;
  --line:#dbe5f3;
}

*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}

.app{
  display:grid;
  grid-template-columns:240px 1fr;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  background:#061a3a;
  color:#fff;
  padding:20px;
}
.nav-title{
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}
.nav-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:400;
}
.nav-item:hover{background:var(--blue)}

/* MAIN */
.main{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  display:flex;
  margin-bottom:14px;
}
.user{justify-content:flex-end}

.bubble{
  max-width:80%;
  padding:14px;
  border-radius:14px;
  background:#fff;
  border:1px solid var(--line);
}
.user .bubble{
  background:var(--blue);
  color:#fff;
}

/* OUTPUT */
.stack{display:grid;gap:10px}

.next{
  border-left:6px solid var(--orange);
  font-size:18px;
  font-weight:600;
  padding:14px;
  border-radius:10px;
  background:#fff;
}

.row{
  display:grid;
  grid-template-columns:1fr 1.5fr 1fr;
  gap:10px;
}

.card{
  border-left:4px solid var(--blue);
  padding:12px;
  background:#fff;
  border-radius:10px;
}

/* INPUT */
.input-bar{
  border-top:1px solid var(--line);
  padding:14px;
  background:#fff;
}
textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  border:1px solid var(--line);
  padding:10px;
}
button{
  margin-top:8px;
  background:var(--orange);
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <div class="nav-title">COMMAND</div>
  <div class="nav-item">Command Center</div>
  <div class="nav-item">Decisions</div>
</div>

<div class="main">

<div id="chat" class="chat"></div>

<div class="input-bar">
  <textarea id="input" placeholder="What needs to get done?"></textarea>
  <button onclick="run()">Run Engine</button>
</div>

</div>
</div>

<script>
const ENDPOINT = "https://executive-engine-os-v2.onrender.com/run";

function addUser(msg){
  const div=document.createElement("div");
  div.className="message user";
  div.innerHTML=`<div class="bubble">${msg}</div>`;
  chat.appendChild(div);
}

function addAI(data){
  const div=document.createElement("div");
  div.className="message";
  div.innerHTML=`
  <div class="bubble">
    <div class="stack">
      <div class="next"><b>Next Move</b><br>${data.next_move}</div>
      <div class="row">
        <div class="card"><b>Decision</b><br>${data.decision}</div>
        <div class="card"><b>Actions</b><br>${data.actions.join("<br>")}</div>
        <div class="card"><b>Risk + Priority</b><br>${data.risk}<br><br>${data.priority}</div>
      </div>
    </div>
  </div>`;
  chat.appendChild(div);
}

async function run(){
  const input = document.getElementById("input").value;
  if(!input) return;

  addUser(input);
  document.getElementById("input").value="";

  const res = await fetch(ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({input})
  });

  const data = await res.json();
  addAI(data);

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
